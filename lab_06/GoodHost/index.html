
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mail App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .box {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    input, button {
      padding: 8px;
      margin: 6px 0;
      font-size: 14px;
    }

    #status {
      font-weight: bold;
      margin-top: 10px;
    }

    pre {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Mail App</h1>

  <div class="box">
    <h2>Login</h2>

    <div>
      <label>Username</label><br>
      <input id="username" type="text" placeholder="alice or john" />
    </div>

    <div>
      <label>Password</label><br>
      <input id="password" type="password" placeholder="alice123 or john123" />
    </div>

    <button id="loginBtn">Login</button>
    <button id="logoutClientBtn">Client-only Logout</button>
    <button id="logoutSyncBtn">Synchronized Logout</button>

    <p>Users:</p>
    <ul>
      <li>alice / alice123</li>
      <li>john / john123</li>
    </ul>

    <div id="status">Checking session...</div>
  </div>

  <div class="box">
    <h2>Actions</h2>
    <button id="loadEmailsBtn">Load /api/emails</button>
    <button id="showCookieBtn">Show document.cookie</button>
    <button id="showSessionsBtn">Show active sessions</button>
    <pre id="output"></pre>
  </div>

  <script src="/main.js"></script>
</body>
</html>
